<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathNova - Competition Categories</title>
  <style>
    /* Premium Light Mode Theme Styling */
    body {
      background-color: #f8fafc;
      color: #1e293b;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Instagram Integration Bar */
    .insta-bar {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      padding: 16px 24px;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 40px;
      box-shadow: 0 10px 25px rgba(220, 39, 67, 0.15);
      color: white;
    }

    .insta-bar p {
      margin: 0;
      font-weight: 700;
      font-size: 15px;
    }

    .insta-btn {
      background: white;
      color: #dc2743;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 800;
      text-decoration: none;
      font-size: 14px;
      transition: transform 0.2s;
    }

    .insta-btn:hover {
      transform: scale(1.03);
    }
/* Header & Visitor Counter */
.header-section {
    text-align: center;
    margin-bottom: 40px;
}

.header-section h1 {
    font-size: 32px;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 8px;
}

.visitor-badge {
    display: inline-block;
    background: #e2e8f0;
    color: #475569;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    margin-top: 5px;
}
   

    /* Grid Layout for Categories */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .category-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      text-decoration: none;
      color: #1e293b;
      font-weight: 700;
      font-size: 18px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    /* Hover effect to make it premium */
    .category-card:hover {
      transform: translateY(-5px);
      border-color: #3b82f6;
      box-shadow: 0 12px 20px -5px rgba(59, 130, 246, 0.15);
      color: #3b82f6;
    }

    .category-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    /* Interactive Feedback Form Section */
    .survey-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.02);
      max-width: 700px;
      margin: 0 auto;
    }

    .survey-box h2 {
      margin-top: 0;
      font-size: 22px;
      color: #0f172a;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
      color: #475569;
    }

    .form-group select, .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-family: inherit;
      box-sizing: border-box;
      background-color: #f8fafc;
      color: #1e293b;
    }

    .submit-btn {
      background: #3b82f6;
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .submit-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="insta-bar">
      
  <div class="insta-bar">
  <p>📸 Get instant results, winner updates & upcoming alerts on our Instagram!</p>
  <a href="https://www.instagram.com/pathnova.official/" target="_blank" class="insta-btn">Follow @pathnova.official</a>
</div>
    

  <div class="survey-box">
  <h2>Help Us Improve PathNova! 🚀</h2>
  <p style="color: #ffffff; font-size: 14px; text-align: center; margin-bottom: 25px;">Your feedback helps us bring the most useful resources right to you.</p>
  
  <form action="https://docs.google.com/forms/d/e/1FAIpQLSfxGAqP1B-DTnc2z38nydW1dlgAv4FcTPspdKzNV_KcoxzmUg/viewform" method="GET" target="_blank">
    
    <div class="form-group">
      <label>1. PathNova ke baare mein aapko kahan se pata chala? (Where did you hear about us?)</label>
      <select name="entry.1" required>
        <option value="" disabled selected>Choose an option</option>
        <option value="instagram">Instagram</option>
        <option value="telegram">Telegram</option>
        <option value="friends">Friends / School</option>
        <option value="search">Google Search</option>
      </select>
    </div>

    <div class="form-group">
      <label>2. What additional resources or features would you like PathNova to provide for students?</label>
      <textarea name="entry.2" rows="4" placeholder="Write your ideas here (e.g., Mock tests, free courses, internships...)" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Submit Feedback</button>
  </form>
</div>
